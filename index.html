<style>
:root {
  --lar-turquesa: #00A8B4;
  --lar-turquesa-dark: #007A82;
  --lar-turquesa-light: #66CAD2;
  --lar-gris: #747678;
  --lar-gris-light: #B5B6B7;
  --lar-gris-bg: #F4F5F5;
  --lar-blanco: #FFFFFF;
  --lar-negro: #1A1A1A;
  --lar-rojo: #B23A48;
  --lar-amber: #D4A017;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: #E8EAEC;
  color: var(--lar-negro);
  padding: 20px;
  min-height: 100vh;
}
.controls {
  background: white; padding: 14px 20px; border-radius: 6px;
  margin-bottom: 22px; display: flex; gap: 14px; flex-wrap: wrap;
  align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  border-top: 4px solid var(--lar-turquesa);
}
.controls .label { font-size: 11px; color: var(--lar-gris); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab {
  background: var(--lar-gris-bg); color: var(--lar-gris); border: 1px solid #DDD;
  padding: 7px 14px; border-radius: 4px; cursor: pointer;
  font-weight: 700; font-size: 12px; transition: all 0.15s; font-family: Arial;
}
.tab:hover { background: var(--lar-turquesa-light); color: white; }
.tab.active { background: var(--lar-turquesa); color: white; border-color: var(--lar-turquesa-dark); }
.btn {
  padding: 7px 14px; border: none; border-radius: 4px; cursor: pointer;
  font-weight: 700; font-size: 12px; font-family: Arial;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.btn-primary { background: var(--lar-turquesa); color: white; }
.btn-primary:hover { background: var(--lar-turquesa-dark); }
.btn-ghost { background: white; color: var(--lar-gris); border: 1px solid var(--lar-gris-light); }
.btn-ghost:hover { background: var(--lar-gris-bg); }

.slide {
  background: white; width: 1280px; max-width: 100%;
  margin: 0 auto 26px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  border-radius: 2px; overflow: hidden; border: 1px solid #DDD;
}
.lar-header {
  background: var(--lar-turquesa); color: white; padding: 8px 28px;
  display: flex; justify-content: space-between; align-items: center;
}
.lar-logo { font-weight: 900; font-size: 18px; letter-spacing: 2px; line-height: 1; }
.lar-logo small { display: block; font-size: 10px; font-weight: 400; letter-spacing: 4px; margin-top: 2px; }
.lar-slogan { font-family: 'Corbel', 'Arial', sans-serif; font-style: italic; font-size: 13px; font-weight: 300; }
.slide-body { padding: 22px 28px; }
.slide-title { font-size: 22px; font-weight: 700; color: var(--lar-gris); margin-bottom: 4px; }
.slide-title strong { color: var(--lar-turquesa); }
.slide-subtitle { font-size: 12px; color: var(--lar-gris-light); margin-bottom: 18px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.lar-endorse { background: var(--lar-negro); color: white; padding: 8px 28px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
.lar-endorse-text { font-weight: 700; letter-spacing: 1px; }
.lar-endorse-date { color: var(--lar-gris-light); font-style: italic; }

.split { display: grid; grid-template-columns: 1.6fr 1fr; gap: 18px; align-items: start; }
.split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.split-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 12px 0; }
.kpi-card { background: var(--lar-gris-bg); padding: 12px 14px; border-left: 4px solid var(--lar-turquesa); border-radius: 2px; }
.kpi-card.gris { border-left-color: var(--lar-gris); }
.kpi-card.dark { background: var(--lar-turquesa); color: white; border-left-color: var(--lar-turquesa-dark); }
.kpi-card.dark .lbl, .kpi-card.dark .sub { color: rgba(255,255,255,0.85); }
.kpi-card.warn { border-left-color: var(--lar-rojo); background: #FBEAEC; }
.kpi-card.amber { border-left-color: var(--lar-amber); background: #FDF7E5; }
.kpi-card .lbl { font-size: 10px; color: var(--lar-gris); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
.kpi-card .val { font-size: 24px; font-weight: 800; color: var(--lar-negro); margin-top: 4px; line-height: 1.05; }
.kpi-card.dark .val { color: white; }
.kpi-card .sub { font-size: 11px; color: var(--lar-gris); margin-top: 2px; }

table.lar { width: 100%; border-collapse: collapse; font-size: 12px; font-family: Arial; }
table.lar th { background: var(--lar-turquesa); color: white; padding: 7px 8px; font-size: 11px; font-weight: 700; text-align: center; border: 1px solid white; text-transform: uppercase; letter-spacing: 0.3px; }
table.lar th.left { text-align: left; }
table.lar td { padding: 6px 8px; border: 1px solid #E5E5E5; text-align: center; font-size: 12px; }
table.lar td.left { text-align: left; font-weight: 600; color: var(--lar-gris); background: var(--lar-gris-bg); }
table.lar tr.kpi td { background: rgba(0,168,180,0.08); font-weight: 700; color: var(--lar-turquesa-dark); }
table.lar tr.totales td { background: var(--lar-gris); color: white; font-weight: 700; }
table.lar tr.totales td.left { background: var(--lar-gris); color: white; }
table.lar tr.warn td { background: #FBEAEC; color: var(--lar-rojo); font-weight: 700; }
table.lar tr.warn td.left { background: var(--lar-rojo); color: white; }

.info-box {
  background: white; border: 1px solid var(--lar-turquesa);
  border-left: 4px solid var(--lar-turquesa); padding: 10px 13px;
  margin-bottom: 10px; border-radius: 2px; font-size: 12px;
  line-height: 1.45; color: var(--lar-gris);
}
.info-box.gris { border-color: var(--lar-gris); border-left-color: var(--lar-gris); }
.info-box.warn { border-color: var(--lar-rojo); border-left-color: var(--lar-rojo); background: #FBEAEC; }
.info-box.amber { border-color: var(--lar-amber); border-left-color: var(--lar-amber); background: #FDF7E5; }
.info-box strong { color: var(--lar-turquesa); display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.info-box.gris strong { color: var(--lar-gris); }
.info-box.warn strong { color: var(--lar-rojo); }
.info-box.amber strong { color: var(--lar-amber); }
.info-box .big { font-size: 22px; color: var(--lar-negro); font-weight: 800; display: block; line-height: 1.1; margin: 2px 0; }
.info-box .accent { color: var(--lar-turquesa); font-weight: 700; }

.chart-wrap { position: relative; height: 220px; margin-top: 10px; }
.chart-wrap.tall { height: 280px; }

.section-title {
  font-size: 13px; font-weight: 700; color: var(--lar-turquesa);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin: 14px 0 8px 0; padding-bottom: 4px;
  border-bottom: 2px solid var(--lar-turquesa);
}
.section-title.gris { color: var(--lar-gris); border-bottom-color: var(--lar-gris); }

.badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-size: 11px; font-weight: 700; }
.badge-controlable { background: var(--lar-rojo); color: white; }
.badge-vida { background: var(--lar-amber); color: white; }
.badge-fin { background: var(--lar-gris); color: white; }
.badge-otro { background: var(--lar-turquesa); color: white; }

@media print { body { background: white; padding: 0; } .controls { display: none; } .slide { box-shadow: none; page-break-after: always; } }

const fmt = {
  num: n => n == null ? '–' : (typeof n === 'string' ? n : Number(n).toLocaleString('es-CL')),
  pct: n => n == null ? '–' : (typeof n === 'string' ? n : (n*100).toFixed(1)+'%'),
  uf: n => n == null ? '–' : (typeof n === 'string' ? n : Number(n).toFixed(2))
};
function trimPeriod(months, ...arrays) {
  let n;
  if (state.periodo === '7m') n = 7;
  else if (state.periodo === 'ytd') {
    const idx = months.findIndex(m => m.includes('26'));
    n = idx >= 0 ? months.length - idx : months.length;
  } else n = months.length;
  const start = Math.max(0, months.length - n);
  return [months.slice(start), ...arrays.map(a => a ? a.slice(start) : a)];
}
function destroyCharts() {
  Object.values(charts).forEach(c => c.destroy && c.destroy());
  charts = {};
}
function buildTabs() {
  const projC = document.getElementById('projectTabs');
  ['Todos', ...PROJECTS].forEach(p => {
    const t = document.createElement('div');
    t.className = 'tab' + (state.proyecto === p ? ' active' : '');
    t.textContent = p; t.dataset.value = p;
    t.onclick = () => { state.proyecto = p; updateTabs(projC, p); render(); };
    projC.appendChild(t);
  });
  const viewC = document.getElementById('viewTabs');
  VIEWS.forEach(v => {
    const t = document.createElement('div');
    t.className = 'tab' + (state.vista === v ? ' active' : '');
    t.textContent = v; t.dataset.value = v;
    t.onclick = () => { state.vista = v; updateTabs(viewC, v); render(); };
    viewC.appendChild(t);
  });
  const perC = document.getElementById('periodTabs');
  PERIODS.forEach(p => {
    const t = document.createElement('div');
    t.className = 'tab' + (state.periodo === p.key ? ' active' : '');
    t.textContent = p.label; t.dataset.value = p.key;
    t.onclick = () => { state.periodo = p.key; updateTabs(perC, p.key); render(); };
    perC.appendChild(t);
  });
}
function updateTabs(container, value) {
  container.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.value === value));
