<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Comercial CCLA · LAR GROUP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root { --tq:#00A8B4; --tqd:#007A82; --tql:#66CAD2; --gr:#747678; --grl:#B5B6B7; --grb:#F4F5F5; --rj:#B23A48; --am:#D4A017; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:Arial,sans-serif; background:#E8EAEC; color:#1A1A1A; padding:20px; min-height:100vh; }
.controls { background:white; padding:14px 20px; border-radius:6px; margin-bottom:22px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; box-shadow:0 2px 6px rgba(0,0,0,.08); border-top:4px solid var(--tq); }
.lbl-c { font-size:11px; color:var(--gr); font-weight:700; text-transform:uppercase; letter-spacing:1px; }
.tabs { display:flex; gap:6px; flex-wrap:wrap; }
.tab { background:var(--grb); color:var(--gr); border:1px solid #DDD; padding:7px 14px; border-radius:4px; cursor:pointer; font-weight:700; font-size:12px; }
.tab:hover { background:var(--tql); color:white; }
.tab.active { background:var(--tq); color:white; border-color:var(--tqd); }
.btn { padding:7px 14px; border:none; border-radius:4px; cursor:pointer; font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
.btn-p { background:var(--tq); color:white; }
.btn-p:hover { background:var(--tqd); }
.btn-g { background:white; color:var(--gr); border:1px solid var(--grl); }
.slide { background:white; width:1280px; max-width:100%; margin:0 auto 26px auto; box-shadow:0 4px 20px rgba(0,0,0,.12); border:1px solid #DDD; }
.lar-header { background:var(--tq); color:white; padding:8px 28px; display:flex; justify-content:space-between; align-items:center; }
.lar-logo { font-weight:900; font-size:18px; letter-spacing:2px; line-height:1; }
.lar-logo small { display:block; font-size:10px; font-weight:400; letter-spacing:4px; margin-top:2px; }
.lar-slogan { font-style:italic; font-size:13px; }
.slide-body { padding:22px 28px; }
.slide-title { font-size:22px; font-weight:700; color:var(--gr); margin-bottom:4px; }
.slide-title strong { color:var(--tq); }
.slide-subtitle { font-size:12px; color:var(--grl); margin-bottom:18px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
.lar-endorse { background:#1A1A1A; color:white; padding:8px 28px; display:flex; justify-content:space-between; font-size:11px; font-weight:700; letter-spacing:1px; }
.lar-endorse .date { color:var(--grl); font-style:italic; font-weight:400; }
.split-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px; }
.kpis { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:10px; margin:12px 0; }
.kpi { background:var(--grb); padding:12px 14px; border-left:4px solid var(--tq); }
.kpi.gris { border-left-color:var(--gr); }
.kpi.dark { background:var(--tq); color:white; border-left-color:var(--tqd); }
.kpi.dark .lbl, .kpi.dark .sub { color:rgba(255,255,255,.85); }
.kpi.warn { border-left-color:var(--rj); background:#FBEAEC; }
.kpi.amber { border-left-color:var(--am); background:#FDF7E5; }
.kpi .lbl { font-size:10px; color:var(--gr); text-transform:uppercase; font-weight:700; letter-spacing:.5px; }
.kpi .val { font-size:24px; font-weight:800; color:#1A1A1A; margin-top:4px; line-height:1.05; }
.kpi.dark .val { color:white; }
.kpi .sub { font-size:11px; color:var(--gr); margin-top:2px; }
table.lar { width:100%; border-collapse:collapse; font-size:12px; }
table.lar th { background:var(--tq); color:white; padding:7px 8px; font-size:11px; font-weight:700; text-align:center; border:1px solid white; text-transform:uppercase; }
table.lar th.left { text-align:left; }
table.lar td { padding:6px 8px; border:1px solid #E5E5E5; text-align:center; font-size:12px; }
table.lar td.left { text-align:left; font-weight:600; color:var(--gr); background:var(--grb); }
table.lar tr.kpi td { background:rgba(0,168,180,.08); font-weight:700; color:var(--tqd); }
table.lar tr.totales td { background:var(--gr); color:white; font-weight:700; }
table.lar tr.warn td { background:#FBEAEC; color:var(--rj); font-weight:700; }
table.lar tr.warn td.left { background:var(--rj); color:white; }
.info-box { background:white; border:1px solid var(--tq); border-left:4px solid var(--tq); padding:10px 13px; margin-bottom:10px; font-size:12px; line-height:1.45; color:var(--gr); }
.info-box.gris { border-color:var(--gr); border-left-color:var(--gr); }
.info-box.warn { border-color:var(--rj); border-left-color:var(--rj); background:#FBEAEC; }
.info-box.amber { border-color:var(--am); border-left-color:var(--am); background:#FDF7E5; }
.info-box strong { color:var(--tq); display:block; font-size:11px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.info-box.warn strong { color:var(--rj); }
.info-box.amber strong { color:var(--am); }
.info-box.gris strong { color:var(--gr); }
.info-box .big { font-size:22px; color:#1A1A1A; font-weight:800; display:block; margin:2px 0; }
.chart-wrap { position:relative; height:220px; margin-top:10px; }
.chart-wrap.tall { height:280px; }
.section-title { font-size:13px; font-weight:700; color:var(--tq); text-transform:uppercase; letter-spacing:.8px; margin:14px 0 8px 0; padding-bottom:4px; border-bottom:2px solid var(--tq); }
.badge { display:inline-block; padding:2px 8px; border-radius:2px; font-size:11px; font-weight:700; color:white; }
.badge.b-controlable { background:var(--rj); }
.badge.b-vida { background:var(--am); }
.badge.b-fin { background:var(--gr); }
.badge.b-interno { background:var(--tq); }
.badge.b-otros { background:var(--grl); }
#error { background:#fee; color:#900; padding:14px; margin:14px; border:2px solid #900; border-radius:6px; font-family:monospace; white-space:pre-wrap; display:none; }
@media print { body{background:white;padding:0;} .controls{display:none;} .slide{box-shadow:none;page-break-after:always;} }
</style>
</head>
<body>
<div class="controls">
  <span class="lbl-c">Proyecto:</span>
  <div class="tabs" id="projectTabs"></div>
  <span class="lbl-c">Vista:</span>
  <div class="tabs" id="viewTabs"></div>
  <span class="lbl-c">Período:</span>
  <div class="tabs" id="periodTabs"></div>
  <button class="btn btn-g" id="resetBtn">Limpiar</button>
  <button class="btn btn-p" id="printBtn">Imprimir / PDF</button>
</div>
<div id="error"></div>
<div id="slidesContainer"></div>
<script src="data.js"></script>
<script src="app.js"></script>
<script>
window.addEventListener('error', function(e){
  var el = document.getElementById('error');
  if (el) { el.style.display = 'block'; el.textContent = 'Error: ' + e.message + ' en ' + e.filename + ':' + e.lineno; }
});
</script>
</body>
</html>
